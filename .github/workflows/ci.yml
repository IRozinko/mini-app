name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: decision_insight
          POSTGRES_USER: decision_user
          POSTGRES_PASSWORD: decision_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U decision_user -d decision_insight"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://decision_user:decision_password@localhost:5432/decision_insight?schema=public
      SESSION_SECRET: ci-session-secret-that-is-long-enough-for-tests
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      LLM_API_KEY: ci-placeholder
      LLM_MODEL: gpt-4o-mini
      LLM_BASE_URL: https://api.openai.com/v1
      LLM_TIMEOUT_MS: "30000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Test
        run: npm run test

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
