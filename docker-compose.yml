services:
  postgres:
    image: postgres:16-alpine
    container_name: decision-insight-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: decision_insight
      POSTGRES_USER: decision_user
      POSTGRES_PASSWORD: decision_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decision_user -d decision_insight"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
